name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent two concurrent publish/docs runs from racing on the same main.
# Do not cancel in-progress publishes - canceling mid-npm-publish leaves
# a half-published version.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

# Default to least-privilege. Individual jobs escalate only what they need.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        # The committed package-lock.json was generated on Windows; npm has a
        # known optional-deps bug (npm/cli#4828) where Linux-native rollup
        # binaries are skipped when the lockfile is from another platform.
        # Drop the lockfile and reinstall with --include=optional so vitest
        # can load @rollup/rollup-linux-x64-gnu on the Ubuntu runner.
        run: |
          rm -f package-lock.json
          npm install --include=optional

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Audit (high+ only, production deps)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write   # for git tag push and gh-release
      id-token: write   # for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for tag push

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check if version changed
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view ue-mcp version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release inputs
        # Required pre-publish inputs for vX.Y.Z, posted after the bump push:
        #   1. A 'landing/headline' commit status with state=success and a
        #      non-empty description (<=140 chars, the GitHub status limit).
        #   2. A draft release tagged vX.Y.Z with a non-empty body.
        # Both are polled for up to ~60s to absorb the small race between
        # 'git push' and the user posting the status / creating the draft.
        if: steps.version.outputs.changed == 'true'
        id: release_inputs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          VERSION: ${{ steps.version.outputs.local }}
        run: |
          set -euo pipefail

          HEADLINE=""
          for i in $(seq 1 30); do
            HEADLINE=$(gh api "repos/$REPO/commits/$SHA/statuses" \
              --jq '[.[] | select(.context=="landing/headline" and .state=="success")][0].description // ""')
            if [ -n "$HEADLINE" ]; then break; fi
            sleep 2
          done
          if [ -z "$HEADLINE" ]; then
            echo "::error::Missing 'landing/headline' commit status on $SHA."
            echo "Post it with:"
            echo "  gh api -X POST repos/$REPO/statuses/$SHA \\"
            echo "    -f state=success -f context=landing/headline \\"
            echo "    -f description='<2-3 features separated by middle-dot, ~70 chars>' \\"
            echo "    -f target_url=https://github.com/$REPO/releases/tag/v$VERSION"
            exit 1
          fi
          if [ "${#HEADLINE}" -gt 140 ]; then
            echo "::error::Headline is ${#HEADLINE} chars; GitHub status descriptions cap at 140."
            exit 1
          fi
          echo "Headline (${#HEADLINE} chars): $HEADLINE"

          DRAFT_BODY=""
          for i in $(seq 1 30); do
            DRAFT_BODY=$(gh release view "v$VERSION" --json body,isDraft \
              --jq 'select(.isDraft==true) | .body' 2>/dev/null || true)
            if [ -n "$DRAFT_BODY" ]; then break; fi
            sleep 2
          done
          if [ -z "$DRAFT_BODY" ]; then
            echo "::error::No draft release v$VERSION with non-empty body found."
            echo "Create it with:"
            echo "  gh release create v$VERSION --draft --notes-file <path/to/notes.md>"
            exit 1
          fi
          echo "Draft release v$VERSION present (${#DRAFT_BODY} chars of body)."

      - name: Install & Build
        if: steps.version.outputs.changed == 'true'
        # See note on the build job's Install step re: the rollup
        # optional-deps bug.
        run: |
          rm -f package-lock.json
          npm install --include=optional
          npx tsc

      - name: Verify build output
        if: steps.version.outputs.changed == 'true'
        run: |
          # Fail loud if prepublishOnly's output is missing or empty - a
          # broken publish is very hard to retract, so we stop here.
          test -s dist/index.js || (echo "dist/index.js missing or empty" && exit 1)
          test -s dist/init.js || (echo "dist/init.js missing or empty" && exit 1)
          test -s dist/update.js || (echo "dist/update.js missing or empty" && exit 1)

      - name: Tag release (before publish)
        if: steps.version.outputs.changed == 'true'
        run: |
          # Create and push the tag BEFORE publishing to npm. If the tag push
          # fails (network / permissions), we have not yet stranded a live
          # npm version without a corresponding tag.
          TAG="v${{ steps.version.outputs.local }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally; skipping creation"
          else
            git tag "$TAG"
          fi
          git push origin "$TAG"

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Package tarball
        if: steps.version.outputs.changed == 'true'
        run: tar czf ue-mcp.tar.gz dist/ plugin/ package.json package-lock.json README.md LICENSE

      - name: Promote draft release
        # The release was authored as a draft before the bump push (see the
        # 'Validate release inputs' step). Here we attach the tarball and flip
        # draft=false so the release goes live. Body is left untouched.
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.local }}
        run: |
          set -euo pipefail
          gh release upload "v$VERSION" ue-mcp.tar.gz --clobber
          gh release edit "v$VERSION" --draft=false --tag "v$VERSION"

  docs:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write   # gh-deploy pushes to gh-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install mkdocs-material
        run: pip install mkdocs-material

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
